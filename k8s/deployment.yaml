apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-deployment
  labels:
    app: aceest-gym
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-gym
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: aceest-gym
    spec:
      containers:
        - name: aceest-gym
          image: aceest-gym:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
