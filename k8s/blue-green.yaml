apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-gym
      version: blue
  template:
    metadata:
      labels:
        app: aceest-gym
        version: blue
    spec:
      containers:
        - name: aceest-gym
          image: aceest-gym:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-gym-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-gym
      version: green
  template:
    metadata:
      labels:
        app: aceest-gym
        version: green
    spec:
      containers:
        - name: aceest-gym
          image: aceest-gym:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001

---
apiVersion: v1
kind: Service
metadata:
  name: aceest-gym-blue-green-service
spec:
  type: NodePort
  selector:
    app: aceest-gym
    version: blue
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30002
      protocol: TCP
      name: http
